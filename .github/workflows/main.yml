name: File-based Auto Build & Keep-Alive

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Quan trọng để git có thể push lại

      # 1. Lấy Version mới nhất từ Repo gốc
      - name: Get Latest Upstream Version
        id: upstream
        run: |
          LATEST_TAG=$(curl -s https://api.github.com/repos/decolua/9router/releases/latest | jq -r .tag_name)
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT

      # 2. Đọc Version cũ từ file 'version.txt' (nếu không có thì mặc định là rỗng)
      - name: Get Local Version
        id: local
        run: |
          if [ -f version.txt ]; then
            LOCAL_TAG=$(cat version.txt)
          else
            LOCAL_TAG="none"
          fi
          echo "tag=$LOCAL_TAG" >> $GITHUB_OUTPUT

      # 3. So sánh và Cập nhật file (Luôn commit để Keep-alive)
      - name: Update Version File & Keep-alive
        id: compare
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          UPSTREAM="${{ steps.upstream.outputs.tag }}"
          LOCAL="${{ steps.local.outputs.tag }}"
          
          if [ "$UPSTREAM" != "$LOCAL" ]; then
            echo "Phát hiện version mới: $UPSTREAM (Cũ: $LOCAL)"
            echo "$UPSTREAM" > version.txt
            echo "should_build=true" >> $GITHUB_OUTPUT
            git add version.txt
            git commit -m "chore: update 9router to $UPSTREAM"
          else
            echo "Không có update. Chỉ cập nhật timestamp để nuôi Action."
            echo "Last check: $(date)" > keep-alive.txt
            echo "should_build=false" >> $GITHUB_OUTPUT
            git add keep-alive.txt
            git commit -m "chore: daily keep-alive $(date)"
          fi
          git push

      # 4. Thiết lập Buildx (Chỉ chạy khi should_build == true)
      - name: Set up Docker Buildx
        if: steps.compare.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      # 5. Log in ghcr.io
      - name: Log in to GHCR
        if: steps.compare.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 6. Build và Push
      - name: Build and Push
        if: steps.compare.outputs.should_build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.upstream.outputs.tag }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
