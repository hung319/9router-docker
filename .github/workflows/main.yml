name: NPM-based Auto Build & Keep-Alive

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *' # Chạy 00:00 hàng ngày

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # 1. Lấy Version mới nhất từ NPM
      - name: Get Latest Version from NPM
        id: npm
        run: |
          LATEST_VER=$(npm view 9router version)
          echo "tag=$LATEST_VER" >> $GITHUB_OUTPUT
          echo "Phiên bản mới nhất trên NPM: $LATEST_VER"

      # 2. Đọc Version cũ từ file local
      - name: Get Local Version
        id: local
        run: |
          if [ -f version.txt ]; then
            LOCAL_VER=$(cat version.txt)
          else
            LOCAL_VER="0.0.0"
          fi
          echo "tag=$LOCAL_VER" >> $GITHUB_OUTPUT

      # 3. So sánh và Duy trì Repo (Keep-alive)
      - name: Update and Commit
        id: compare
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          NPM_VER="${{ steps.npm.outputs.tag }}"
          LOCAL_VER="${{ steps.local.outputs.tag }}"
          
          if [ "$NPM_VER" != "$LOCAL_VER" ]; then
            echo "Phát hiện bản mới trên NPM: $NPM_VER"
            echo "$NPM_VER" > version.txt
            echo "should_build=true" >> $GITHUB_OUTPUT
            git add version.txt
            git commit -m "chore: upgrade 9router to v$NPM_VER from NPM"
          else
            echo "NPM không có bản mới. Cập nhật log để nuôi Action."
            echo "Last NPM check: $(date) - Version: $NPM_VER" > keep-alive.txt
            echo "should_build=false" >> $GITHUB_OUTPUT
            git add keep-alive.txt
            git commit -m "chore: daily keep-alive (NPM sync)"
          fi
          git push

      # 4. Set up Docker Buildx (Chỉ chạy khi có bản mới)
      - name: Set up Docker Buildx
        if: steps.compare.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      # 5. Login GHCR
      - name: Log in to GHCR
        if: steps.compare.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 6. Build và Push Image
      - name: Build and Push
        if: steps.compare.outputs.should_build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.npm.outputs.tag }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
