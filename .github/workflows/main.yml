name: Smart Auto Build & Keep-Alive

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # Kiểm tra mỗi ngày 1 lần

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # 1. Lấy Version mới nhất từ Repo gốc (Upstream)
      - name: Get Latest Upstream Version
        id: upstream
        run: |
          LATEST_TAG=$(curl -s https://api.github.com/repos/decolua/9router/releases/latest | jq -r .tag_name)
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT

      # 2. Kiểm tra xem Version đó đã tồn tại trên Docker GHCR của bạn chưa
      - name: Check if Image exists
        id: check_image
        continue-on-error: true
        run: |
          TOKEN=$(echo ${{ secrets.GITHUB_TOKEN }} | base64)
          # Gửi request kiểm tra tag trên GHCR
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            https://ghcr.io/v2/${{ github.repository }}/manifests/${{ steps.upstream.outputs.tag }})
          
          if [ "$STATUS" -eq "200" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      # 3. Tạo commit "nuôi" Action (Luôn chạy để tránh bị disable)
      - name: Keep-alive commit
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          echo "Last check: $(date) - Latest upstream: ${{ steps.upstream.outputs.tag }}" > status.txt
          git add status.txt
          git commit -m "chore: status sync ${{ steps.upstream.outputs.tag }}" || echo "No changes"
          git push

      # 4. Chỉ Build nếu Image chưa tồn tại (Tiết kiệm thời gian)
      - name: Set up Docker Buildx
        if: steps.check_image.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.check_image.outputs.exists == 'false'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        if: steps.check_image.outputs.exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.upstream.outputs.tag }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
